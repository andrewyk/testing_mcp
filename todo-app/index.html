<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Modern Todo App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-wrapper">
        <div class="container">
            <header class="app-header">
                <h1>✨ Todo App</h1>
                <p class="subtitle">Organize your tasks with style</p>
            </header>
            
            <!-- Input section -->
            <div class="input-section">
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="todo-input" 
                        placeholder="What would you like to accomplish today?" 
                        autocomplete="off"
                    >
                    <button id="add-btn">
                        <span class="btn-text">Add Task</span>
                        <span class="btn-icon">+</span>
                    </button>
                </div>
            </div>

            <!-- Filter buttons -->
            <div class="filters">
                <button class="filter-btn active" data-filter="all">
                    <span class="filter-icon">📋</span>All
                </button>
                <button class="filter-btn" data-filter="active">
                    <span class="filter-icon">⚡</span>Active
                </button>
                <button class="filter-btn" data-filter="completed">
                    <span class="filter-icon">✅</span>Completed
                </button>
            </div>

            <!-- Todo list -->
            <div class="todo-section">
                <ul id="todo-list" class="todo-list"></ul>
            </div>

            <!-- Footer with stats and actions -->
            <footer class="footer">
                <div class="stats">
                    <span id="todo-count" class="count-badge">0 items left</span>
                </div>
                <button id="clear-completed" class="clear-btn">
                    <span class="clear-icon">🗑️</span>
                    Clear Completed
                </button>
            </footer>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
